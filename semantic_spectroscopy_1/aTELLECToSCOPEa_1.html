<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATELLECTASCOPEA | M.C.V.S. Baseline</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactzone { pointer-events: auto; background: rgba(0, 20, 20, 0.85); border: 1px solid rgba(0, 255, 204, 0.3); backdrop-filter: blur(10px); }
        .glitch-text { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer flex flex-col justify-between p-6 h-full">
        <div class="flex justify-between items-start">
            <div class="interactzone p-4 rounded-lg">
                <h1 class="text-2xl font-bold glitch-text mb-1">aTELLECToSCOPEa</h1>
                <p class="text-xs opacity-70">M.C.V.S. PHYSICS BASELINE v1.0</p>
                <div id="status-readout" class="mt-4 text-[10px] leading-tight space-y-1 max-w-xs">
                    <div class="flex justify-between"><span>CORE_SYNC:</span><span class="text-white">ACTIVE</span></div>
                    <div class="flex justify-between"><span>MCVS_ENGINE:</span><span class="text-white text-right">MASS_CHARGE_VEL_SPIN</span></div>
                    <div class="flex justify-between"><span>SIGNAL_MODE:</span><span class="text-white">CONEZ_REELZ</span></div>
                </div>
            </div>
            
            <div class="interactzone p-4 rounded-lg flex flex-col gap-2">
                <button onclick="toggleNetz()" class="px-3 py-1 border border-[#00ffcc] hover:bg-[#00ffcc] hover:text-black transition-all text-xs">TOGGLE REELZ</button>
                <button onclick="resetCamera()" class="px-3 py-1 border border-[#00ffcc] hover:bg-[#00ffcc] hover:text-black transition-all text-xs">CENTER CAM</button>
            </div>
        </div>

        <div class="flex justify-center gap-4">
            <div class="interactzone p-4 rounded-t-xl w-full max-w-2xl flex flex-col gap-3">
                <div class="flex gap-2">
                    <input type="text" id="prompt-input" placeholder="Inject query into the network..." 
                        class="bg-black/50 border border-[#00ffcc]/30 p-2 text-sm w-full outline-none focus:border-[#00ffcc] text-[#00ffcc] interactzone">
                    <button onclick="injectPulse()" class="px-4 py-2 bg-[#00ffcc] text-black font-bold text-xs hover:bg-white transition-all interactzone">PULSE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, clock;
        let orbs = [], netzLines = [], conez = [];
        let showNetz = true;

        const MCVS_DATA = [
            { label: "FINANCIAL", mass: 2.5, charge: 1.0, velocity: 0.1, spin: 0.5, x: 0, y: 0, z: 0, type: 'core', content: "The heart of the systemic flow.", signal: "STABLE", texMode: 'cluster_core' },
            { label: "CPI_RELEASE", mass: 1.4, charge: -0.8, velocity: 2.5, spin: 2.0, x: 10, y: 8, z: 4, type: 'ai', content: "Upcoming inflationary data point.", signal: "HIGH_VOL", texMode: 'wireframe' },
            { label: "SILICON_VALLEY", mass: 1.8, charge: 0.9, velocity: 0.5, spin: 0.5, x: -5, y: 3, z: 8, type: 'ai', content: "Central tech capital flow.", signal: "STABLE", texMode: 'cluster_core' },
            { label: "YIELD_CURVE", mass: 1.5, charge: -0.9, velocity: 0.3, spin: 0.2, x: -10, y: 6, z: -5, type: 'ai', content: "Treasury rate inversion tracking.", signal: "WARNING", texMode: 'fog' },
            { label: "GENESIS_NODE", mass: 2.0, charge: 0.3, velocity: 0.2, spin: 1.8, x: -8, y: -12, z: -15, type: 'ai', content: "The origin of decentralized ledger flow.", signal: "STABLE", texMode: 'cluster_core' }
        ];

        // Shared Textures
        const sharedGlowMaterial = new THREE.SpriteMaterial({
            map: createGlowTexture(),
            color: 0x00ffcc,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.2, 'rgba(0,255,204,0.8)');
            grad.addColorStop(0.5, 'rgba(0,255,204,0.2)');
            grad.addColorStop(1, 'rgba(0,255,204,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 64);
            const tex = new THREE.CanvasTexture(canvas);
            return tex;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 15, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0x404040, 1);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x00ffcc, 1.5, 100);
            pointLight.position.set(10, 20, 10);
            scene.add(pointLight);

            createNetwork();
            animate();
        }

        function createNetwork() {
            MCVS_DATA.forEach(d => {
                const group = new THREE.Group();
                group.position.set(d.x, d.y, d.z);
                
                const finalSize = d.mass * (d.type === 'core' ? 1.5 : 1.0);
                const orbColor = d.charge > 0 ? 0x00ffcc : 0xff3366;
                
                const geo = new THREE.SphereGeometry(finalSize, 32, 32);
                let mat, subMesh;
                const common = { color: orbColor, metalness: 0.9, roughness: 0.1 };

                if (d.texMode === 'cluster_core') {
                    mat = new THREE.MeshStandardMaterial({...common, transparent: true, opacity: 0.3});
                    subMesh = new THREE.Group();
                    for(let i=0; i<6; i++) {
                        const sGeo = new THREE.SphereGeometry(finalSize * 0.3, 16, 16);
                        const sMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: orbColor, emissiveIntensity: 1.5 });
                        const sMesh = new THREE.Mesh(sGeo, sMat);
                        sMesh.position.set((Math.random()-0.5)*finalSize, (Math.random()-0.5)*finalSize, (Math.random()-0.5)*finalSize);
                        subMesh.add(sMesh);
                    }
                } else if (d.texMode === 'fog') {
                    mat = new THREE.MeshStandardMaterial({...common, transparent: true, opacity: 0.05, depthWrite: false});
                    const fogGeo = new THREE.BufferGeometry();
                    const fogPos = [];
                    for(let i=0; i<60; i++) {
                        const r = finalSize * 0.8 * Math.cbrt(Math.random());
                        const theta = Math.random() * 2 * Math.PI;
                        const phi = Math.acos(2 * Math.random() - 1);
                        fogPos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
                    }
                    fogGeo.setAttribute('position', new THREE.Float32BufferAttribute(fogPos, 3));
                    const fogMat = new THREE.PointsMaterial({
                        color: orbColor, size: finalSize * 1.5, map: sharedGlowMaterial.map, transparent: true, opacity: 0.8, depthWrite: false, blending: THREE.AdditiveBlending
                    });
                    subMesh = new THREE.Points(fogGeo, fogMat);
                } else {
                    mat = new THREE.MeshStandardMaterial({...common, wireframe: d.texMode === 'wireframe'});
                    subMesh = new THREE.Mesh(new THREE.SphereGeometry(finalSize*0.5, 16, 16), new THREE.MeshStandardMaterial({color: 0xffffff, emissive: orbColor, emissiveIntensity: 1}));
                }

                const mainOrb = new THREE.Mesh(geo, mat);
                group.add(mainOrb);
                if(subMesh) group.add(subMesh);

                // Conez (Signal Indicators)
                const coneGeo = new THREE.ConeGeometry(finalSize * 0.3, finalSize * 0.8, 4);
                const coneMat = new THREE.MeshBasicMaterial({ color: orbColor, wireframe: true, transparent: true, opacity: 0.6 });
                const cone = new THREE.Mesh(coneGeo, coneMat);
                cone.position.y = finalSize * 1.2;
                group.add(cone);
                conez.push({ mesh: cone, rate: d.velocity });

                group.userData = { ...d, size: finalSize, subMesh: subMesh, isCenter: d.type === 'core' };
                scene.add(group);
                orbs.push(group);
            });

            // Reelz (Network Lines)
            const center = orbs.find(o => o.userData.isCenter);
            orbs.forEach(o => {
                if(o !== center) {
                    const reelGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
                    const reelMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.3 });
                    const reel = new THREE.Mesh(reelGeo, reelMat);
                    scene.add(reel);
                    netzLines.push({ p1: center, p2: o, mesh: reel });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            orbs.forEach((orb, i) => {
                const d = orb.userData;
                // M.C.V.S. Physics
                if (d.texMode === 'cluster_core' && d.subMesh) {
                    d.subMesh.rotation.y += 0.01 * d.spin;
                    d.subMesh.rotation.z += 0.005;
                }
                if (d.texMode === 'fog' && d.subMesh) {
                    d.subMesh.rotation.y += 0.002;
                    d.subMesh.position.y = Math.sin(time + i) * 0.1;
                }
                orb.scale.setScalar(1 + Math.sin(time * 2 + i) * 0.02);
            });

            conez.forEach(c => {
                c.mesh.rotation.y += 0.05 * c.rate;
                c.mesh.position.y += Math.sin(time * 5) * 0.001;
            });

            netzLines.forEach(l => {
                const p1 = l.p1.position, p2 = l.p2.position;
                const r1 = l.p1.userData.size;
                const r2 = l.p2.userData.size;
                const dir = new THREE.Vector3().subVectors(p2, p1);
                const dist = dir.length();
                const truncatedDist = Math.max(0, dist - r1 - r2);

                if (dist > r1 + r2 && showNetz) {
                    l.mesh.visible = true;
                    l.mesh.scale.y = truncatedDist;
                    l.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
                    const offset = dir.clone().normalize().multiplyScalar(r1 + truncatedDist/2);
                    l.mesh.position.copy(p1).add(offset);
                } else {
                    l.mesh.visible = false;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        function toggleNetz() { showNetz = !showNetz; }
        function resetCamera() { controls.reset(); camera.position.set(20, 15, 30); }
        function injectPulse() { 
            const input = document.getElementById('prompt-input');
            if(!input.value) return;
            console.log("Injected:", input.value);
            input.value = "";
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
