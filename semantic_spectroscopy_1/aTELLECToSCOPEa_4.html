<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATELLECTASCOPEA | Nebula Core Update</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020205; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactzone { pointer-events: auto; background: rgba(0, 10, 20, 0.8); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(8px); padding: 15px; border-radius: 4px; }
        .glitch-text { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .motto-bar { position: absolute; bottom: 20px; width: 100%; text-align: center; letter-spacing: 0.3em; font-size: 0.8rem; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer p-6 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="interactzone">
                <h1 class="text-xl font-bold tracking-widest glitch-text">aTELLECToSCOPEa v2.0</h1>
                <p class="text-xs mt-1 opacity-70">NEBULA CORE ANALYSIS: ACTIVE</p>
                <div class="mt-4 space-y-1">
                    <div class="text-[10px] flex justify-between"><span>DENSITY</span><span id="stat-den">88.4%</span></div>
                    <div class="w-32 h-1 bg-cyan-900"><div id="bar-den" class="h-full bg-cyan-400" style="width: 88%"></div></div>
                </div>
            </div>
            <div class="interactzone text-right">
                <p class="text-xs">COORD: <span id="coords">0.00, 0.00, 0.00</span></p>
                <p class="text-[10px] opacity-50">USER: NET FALCON</p>
            </div>
        </div>

        <div class="motto-bar">
            to aSEEKa, aSPARKa in aDARKa
        </div>
    </div>

    <script>
        // --- SHADER DEFINITIONS ---
        // Enhanced "Nebula/Cloud" Shader using fBm (fractal Brownian motion)
        const NebulaShader = {
            uniforms: {
                time: { value: 0.0 },
                baseColor: { value: new THREE.Color(0x00ccff) },
                nebulaColor: { value: new THREE.Color(0xaa00ff) }
            },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vPosition;
                varying vec3 vNormal;
                void main() {
                    vUv = uv;
                    vPosition = position;
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 baseColor;
                uniform vec3 nebulaColor;
                varying vec2 vUv;
                varying vec3 vPosition;
                varying vec3 vNormal;

                // Simple 3D Noise
                float mod289(float x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
                vec4 mod289(vec4 x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
                vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
                vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

                float snoise(vec3 v) {
                    const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                    const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                    vec3 i  = floor(v + dot(v, C.yyy) );
                    vec3 x0 = v - i + dot(i, C.xxx) ;
                    vec3 g = step(x0.yzx, x0.xyz);
                    vec3 l = 1.0 - g;
                    vec3 i1 = min( g.xyz, l.zxy );
                    vec3 i2 = max( g.xyz, l.zxy );
                    vec3 x1 = x0 - i1 + C.xxx;
                    vec3 x2 = x0 - i2 + C.yyy;
                    vec3 x3 = x0 - D.yyy;
                    i = mod289(i);
                    vec4 p = permute( permute( permute(
                                i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                            + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                            + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                    float n_ = 0.142857142857;
                    vec3  ns = n_ * D.wyz - p.xzw;
                    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                    vec4 x_ = floor(j * ns.z);
                    vec4 y_ = floor(j - 7.0 * x_ );
                    vec4 x = x_ *ns.x + ns.yyyy;
                    vec4 y = y_ *ns.x + ns.yyyy;
                    vec4 h = 1.0 - abs(x) - abs(y);
                    vec4 b0 = vec4( x.xy, y.xy );
                    vec4 b1 = vec4( x.zw, y.zw );
                    vec4 s0 = floor(b0)*2.0 + 1.0;
                    vec4 s1 = floor(b1)*2.0 + 1.0;
                    vec4 sh = -step(h, vec4(0.0));
                    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                    vec3 p0 = vec3(a0.xy,h.x);
                    vec3 p1 = vec3(a0.zw,h.y);
                    vec3 p2 = vec3(a1.xy,h.z);
                    vec3 p3 = vec3(a1.zw,h.w);
                    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                    m = m * m;
                    return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
                }

                // Fractal Brownian Motion for cloud detail
                float fbm(vec3 p) {
                    float v = 0.0;
                    float a = 0.5;
                    vec3 shift = vec3(100.0);
                    for (int i = 0; i < 4; i++) {
                        v += a * snoise(p);
                        p = p * 2.0 + shift;
                        a *= 0.5;
                    }
                    return v;
                }

                void main() {
                    // Fresnel effect for soft edges
                    float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                    
                    // Animate noise
                    vec3 noisePos = vPosition * 2.5 + vec3(0.0, 0.0, time * 0.2);
                    float n = fbm(noisePos);
                    
                    // Thresholding for cloud density
                    float cloud = smoothstep(-0.2, 0.6, n);
                    
                    // Final color mixing
                    vec3 color = mix(baseColor, nebulaColor, n * 0.5 + 0.5);
                    float alpha = cloud * (1.0 - fresnel); // Fade at edges
                    
                    gl_FragColor = vec4(color, alpha * 0.8);
                }
            `
        };

        // --- APP INITIALIZATION ---
        let scene, camera, renderer, controls;
        let orbs = [], netzLines = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 40, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            createNebulaCloud(0, 0, 0, 30, 0x00ffff, 0x9900ff);
            
            // Add some background "data" orbs
            for(let i=0; i<40; i++) {
                const r = 60 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                
                createDataNode(x, y, z);
            }

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createNebulaCloud(x, y, z, size, color1, color2) {
            const group = new THREE.Group();
            group.position.set(x, y, z);

            // 1. The Core Shader Mesh (The "Foggy" Cloud)
            const geo = new THREE.SphereGeometry(size, 64, 64);
            const mat = new THREE.ShaderMaterial({
                uniforms: THREE.UniformsUtils.clone(NebulaShader.uniforms),
                vertexShader: NebulaShader.vertexShader,
                fragmentShader: NebulaShader.fragmentShader,
                transparent: true,
                depthWrite: false,
                side: THREE.BackSide, // Look into the cloud
                blending: THREE.AdditiveBlending
            });
            mat.uniforms.baseColor.value = new THREE.Color(color1);
            mat.uniforms.nebulaColor.value = new THREE.Color(color2);

            const nebulaMesh = new THREE.Mesh(geo, mat);
            group.add(nebulaMesh);

            // 2. An outer glow shell
            const outerGeo = new THREE.SphereGeometry(size * 1.2, 32, 32);
            const outerMat = new THREE.MeshBasicMaterial({
                color: color1,
                transparent: true,
                opacity: 0.05,
                wireframe: true
            });
            const outerMesh = new THREE.Mesh(outerGeo, outerMat);
            group.add(outerMesh);

            scene.add(group);
            
            // Store for animation loop
            orbs.push({
                mesh: group,
                shader: mat,
                isCenter: true
            });
        }

        function createDataNode(x, y, z) {
            const geo = new THREE.IcosahedronGeometry(1.5, 0);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            orbs.push({ mesh: mesh, isCenter: false });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            orbs.forEach(orb => {
                if(orb.isCenter && orb.shader) {
                    orb.shader.uniforms.time.value = time;
                    orb.mesh.rotation.y += 0.002;
                } else {
                    orb.mesh.rotation.x += 0.01;
                    orb.mesh.rotation.y += 0.01;
                }
            });

            // Update UI
            document.getElementById('coords').innerText = 
                `${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)}`;

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
